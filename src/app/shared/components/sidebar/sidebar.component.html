<aside class="flex w-60 shrink-0 flex-col bg-slate-900 text-slate-300">
  <!-- Brand -->
  <div class="border-b border-slate-700 px-5 py-5">
    <div class="flex items-center gap-2.5">
      <span class="text-xl text-blue-400">&#9670;</span>
      <span class="text-base font-bold tracking-wide text-slate-100">D3 Handbook</span>
    </div>
    <div class="mt-1.5 flex gap-1.5 pl-7">
      <span class="rounded bg-slate-700 px-1.5 py-0.5 text-[10px] font-semibold text-blue-300">Angular 18</span>
      <span class="rounded bg-slate-700 px-1.5 py-0.5 text-[10px] font-semibold text-emerald-300">D3 v7</span>
    </div>
  </div>

  <!-- Nav sections -->
  <nav class="mt-3 flex-1 overflow-y-auto px-3">
    @for (section of sections; track section.title) {
      <div class="mb-2">
        <div class="px-2 pb-1.5 pt-4 text-[10px] font-bold uppercase tracking-widest text-slate-500">
          {{ section.title }}
        </div>
        @for (item of section.items; track item.route) {
          <a
            [routerLink]="item.route"
            routerLinkActive="bg-blue-500/10 !text-blue-400 font-semibold"
            class="mb-0.5 block rounded-md px-3 py-2 text-[13px] text-slate-400 transition-colors hover:bg-slate-800 hover:text-slate-200"
          >{{ item.label }}</a>
        }
      </div>
    }
  </nav>
</aside>
