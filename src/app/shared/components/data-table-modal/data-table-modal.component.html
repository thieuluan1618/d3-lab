@if (config.visible) {
  <!-- Backdrop -->
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40" (click)="close.emit()">
    <!-- Modal -->
    <div
      class="relative max-h-[80vh] w-full max-w-3xl overflow-hidden rounded-xl bg-white shadow-2xl"
      (click)="$event.stopPropagation()"
    >
      <!-- Header -->
      <div class="flex items-center justify-between border-b border-slate-200 px-5 py-3">
        <h3 class="text-sm font-semibold text-slate-800">{{ config.title }}</h3>
        <button
          (click)="close.emit()"
          class="rounded p-1 text-slate-400 hover:bg-slate-100 hover:text-slate-600"
        >
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Table -->
      <div class="overflow-auto p-4" style="max-height: calc(80vh - 56px)">
        <table class="w-full text-left text-sm">
          <thead>
            <tr class="border-b border-slate-200">
              @for (col of config.columns; track col) {
                <th class="whitespace-nowrap px-3 py-2 text-xs font-semibold uppercase text-slate-500">{{ col }}</th>
              }
            </tr>
          </thead>
          <tbody>
            @for (row of config.rows; track $index) {
              <tr class="border-b border-slate-100 hover:bg-slate-50">
                @for (col of config.columns; track col) {
                  <td class="whitespace-nowrap px-3 py-1.5 text-slate-700">{{ row[col] }}</td>
                }
              </tr>
            }
          </tbody>
        </table>
        <div class="mt-3 text-xs text-slate-400">{{ config.rows.length }} row{{ config.rows.length !== 1 ? 's' : '' }}</div>
      </div>
    </div>
  </div>
}
